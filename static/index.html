<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormNest - 宿舍管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>DormNest 宿舍管理系统</h1>
        <p>欢迎使用宿舍管理系统</p>

        <div class="info">
            <h2>系统信息</h2>
            <p>API 文档地址：<a href="/docs" target="_blank">/docs</a></p>
            <p>ReDoc 文档地址：<a href="/redoc" target="_blank">/redoc</a></p>
        </div>

        <div class="login-form">
            <h2>用户登录</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="用户名" required>
                <input type="password" id="password" placeholder="密码" required>
                <button type="submit">登录</button>
            </form>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
